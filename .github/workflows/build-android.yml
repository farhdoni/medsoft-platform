name: Build Android APK (local EAS)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: false
        default: 'local-preview'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile-patient

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install root dependencies
        run: npm ci
        working-directory: .

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Restore keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks

      - name: Write credentials.json
        env:
          KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          cat > credentials.json <<EOF
          {
            "android": {
              "keystore": {
                "keystorePath": "./keystore.jks",
                "keystorePassword": "$STORE_PASSWORD",
                "keyAlias": "$KEY_ALIAS",
                "keyPassword": "$KEY_PASSWORD"
              }
            }
          }
          EOF

      - name: Build APK locally
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --local \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'local-preview' }} \
            --non-interactive \
            --output ../../aivita-patient.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aivita-patient-${{ github.sha }}
          path: aivita-patient.apk
          retention-days: 14
