<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Нет подключения — AIVITA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background-color: #f4f3ef;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px;
    }
    .card {
      background: #ffffff;
      border-radius: 28px;
      padding: 40px 32px;
      text-align: center;
      max-width: 340px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(156, 94, 108, 0.12);
    }
    .logo {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #9c5e6c;
      margin-bottom: 28px;
    }
    .icon {
      font-size: 56px;
      margin-bottom: 20px;
      display: block;
    }
    h1 {
      font-size: 19px;
      font-weight: 700;
      color: #2d2230;
      margin-bottom: 10px;
      line-height: 1.3;
    }
    p {
      font-size: 14px;
      color: #9a8fa0;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    button {
      background: #9c5e6c;
      color: #ffffff;
      border: none;
      border-radius: 16px;
      padding: 14px 36px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.18s;
    }
    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">AIVITA</div>
    <span class="icon">📡</span>
    <h1>Нет подключения к интернету</h1>
    <p>Проверьте соединение и попробуйте снова</p>
    <button onclick="location.reload()">Обновить</button>
  </div>
</body>
</html>
