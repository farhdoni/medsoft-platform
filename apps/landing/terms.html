*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#c87d8a;
  --accent2:#8b6aae;
  --dark:#1a1824;
  --bg:#faf9f7;
  --muted:#9a96a8;
  --card:#ffffff;
  --border:#e8e5f0;
  --text:#2d2a38;
}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}

.topnav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;
  background:rgba(250,249,247,0.94);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.logo{
  font-size:22px;font-weight:800;text-decoration:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.topnav .right{display:flex;align-items:center;gap:14px;}
.lang-switch{position:relative;}
.lang-trigger{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.7);border:1px solid rgba(42,37,64,.1);border-radius:50px;padding:9px 14px;font-size:12px;font-weight:700;font-family:inherit;color:var(--text);cursor:pointer;transition:all .25s;letter-spacing:.5px;}
.lang-trigger:hover{background:rgba(255,255,255,.95);}
.lang-trigger svg{width:14px;height:14px;}
.lang-trigger .caret{font-size:9px;opacity:.55;transition:transform .25s;}
.lang-switch.open .lang-trigger .caret{transform:rotate(180deg);}
.lang-menu{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid rgba(42,37,64,.08);border-radius:14px;padding:6px;min-width:132px;box-shadow:0 18px 40px rgba(42,37,64,.12),0 4px 10px rgba(42,37,64,.05);display:none;flex-direction:column;gap:2px;z-index:60;}
.lang-switch.open .lang-menu{display:flex;}
.lang-menu button{border:none;background:transparent;padding:9px 12px;font-size:13px;font-weight:600;font-family:inherit;color:var(--text);border-radius:9px;cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between;gap:10px;transition:background .2s;}
.lang-menu button:hover{background:rgba(200,125,138,.08);}
.lang-menu button .code{font-size:11px;color:var(--muted);letter-spacing:.5px;}
.lang-menu button.active{background:rgba(200,125,138,.15);color:var(--accent);}
.lang-menu button.active .code{color:var(--accent);}
.account-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;border-radius:50px;border:1px solid rgba(42,37,64,.1);background:rgba(255,255,255,.7);color:var(--text);font-family:inherit;font-size:13px;font-weight:700;white-space:nowrap;cursor:pointer;transition:all .3s;}
.account-btn:hover{background:var(--dark);color:#fff;border-color:var(--dark);transform:translateY(-1px);}
.account-btn svg{width:18px;height:18px;}

.hero{
  text-align:center;padding:60px 24px 48px;
  max-width:760px;margin:0 auto;
}
.hero h1{
  font-size:clamp(28px,5vw,48px);font-weight:800;line-height:1.15;
  margin-bottom:16px;
  background:linear-gradient(135deg,var(--dark) 0%,var(--accent2) 55%,var(--accent) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-meta{font-size:14px;color:var(--muted)}

.policy-wrap{max-width:800px;margin:0 auto;padding:0 24px 80px}
.policy-section{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:28px 32px;margin-bottom:16px;
}
.policy-section-title{
  font-size:17px;font-weight:700;color:var(--dark);
  margin-bottom:12px;
  display:flex;align-items:center;gap:10px;
}
.policy-section-title::before{
  content:'';display:block;width:4px;height:20px;border-radius:2px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  flex-shrink:0;
}
.policy-section-body{font-size:15px;color:var(--text);line-height:1.8}
.policy-section-body p{margin-bottom:10px}
.policy-section-body p:last-child{margin-bottom:0}
.policy-section-body ul{padding-left:20px;margin-top:8px}
.policy-section-body li{margin-bottom:6px}

.footer{padding:32px 24px;text-align:center;border-top:1px solid rgba(42,37,64,.06);max-width:1000px;margin:40px auto 0;}
.footer-brand{font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
.footer-links{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
.footer-links a{font-size:13px;color:var(--muted);text-decoration:none;font-weight:500;transition:color .2s;}
.footer-links a:hover,.footer-links a.active{color:var(--accent);}
.footer-links a.active{font-weight:700;}
.footer-socials{display:flex;gap:12px;justify-content:center;margin:0 0 16px;}
.footer-socials a{width:40px;height:40px;border-radius:50%;background:#fff;border:1px solid rgba(42,37,64,.08);display:inline-flex;align-items:center;justify-content:center;color:var(--muted);transition:all .25s cubic-bezier(.4,0,.2,1);text-decoration:none;}
.footer-socials a:hover{transform:translateY(-3px);box-shadow:0 10px 22px rgba(42,37,64,.10);color:#fff;}
.footer-socials a svg{width:18px;height:18px;display:block;}
.footer-socials a.tg:hover{background:#229ED9;border-color:#229ED9;}
.footer-socials a.wa:hover{background:#25D366;border-color:#25D366;}
.footer-socials a.ig:hover{background:linear-gradient(135deg,#F58529,#DD2A7B,#8134AF);border-color:transparent;}
.footer-socials a.fb:hover{background:#1877F2;border-color:#1877F2;}
.footer-socials a.yt:hover{background:#FF0000;border-color:#FF0000;}
.footer-copy{font-size:11px;color:#ccc;}

@media(max-width:560px){
  .topnav{padding:12px 16px;}
  .topnav .logo{font-size:18px;}
  .account-btn span{display:none;}
  .account-btn{padding:9px 11px;}
  .lang-trigger{padding:8px 11px;font-size:11px;}
  .policy-section{padding:20px}
}
</style>

function t(key) {
  const tr = I18N[lang] || I18N.ru;
  return tr[key] !== undefined ? tr[key] : (I18N.ru[key] || key);
}

function renderSections() {
  const tr = I18N[lang] || I18N.ru;
  const wrap = document.getElementById('policy-sections');
  if (!wrap || !tr.sections) return;
  wrap.innerHTML = tr.sections.map(s =>
    `<div class="policy-section">
      <div class="policy-section-title">${s.title}</div>
      <div class="policy-section-body">${s.body}</div>
    </div>`
  ).join('');
}

function render() {
  document.title = t('page_title') + ' — aivita';
  const langCurrent = document.getElementById('langCurrent');
  if (langCurrent) langCurrent.textContent = lang.toUpperCase();
  document.querySelectorAll('#langSwitch .lang-menu button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (key) el.textContent = t(key);
  });
  renderSections();
}

function setLang(l) {
  lang = l;
  localStorage.setItem(LANG_KEY, l);
  render();
}

const langSwitch = document.getElementById('langSwitch');
const langTrigger = document.getElementById('langTrigger');
const langMenu = document.getElementById('langMenu');
if (langTrigger && langMenu) {
  langTrigger.addEventListener('click', e => {
    e.stopPropagation();
    langSwitch.classList.toggle('open');
  });
  langMenu.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      setLang(btn.dataset.lang);
      langSwitch.classList.remove('open');
    });
  });
  document.addEventListener('click', () => langSwitch.classList.remove('open'));
}

const APP_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://app.aivita.uz';
const loginBtn = document.getElementById('loginBtn');
if (loginBtn) loginBtn.addEventListener('click', () => window.location.href = APP_URL + '/ru/sign-in');

render();
