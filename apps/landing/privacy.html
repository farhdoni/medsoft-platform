.lang-trigger .caret{font-size:9px;opacity:.55;transition:transform .25s;}
.lang-switch.open .lang-trigger .caret{transform:rotate(180deg);}

function t(key) {
  const tr = I18N[lang] || I18N.ru;
  return tr[key] !== undefined ? tr[key] : (I18N.ru[key] || key);
}

function renderSections() {
  const tr = I18N[lang] || I18N.ru;
  const wrap = document.getElementById('policy-sections');
  if (!wrap || !tr.sections) return;
  wrap.innerHTML = tr.sections.map(s =>
    `<div class="policy-section">
      <div class="policy-section-title">${s.title}</div>
      <div class="policy-section-body">${s.body}</div>
    </div>`
  ).join('');
}

function render() {
  document.title = t('page_title') + ' — aivita';
  document.querySelectorAll('#langSwitch .lang-menu button').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  const cur = document.getElementById('langCurrent');
  if (cur) cur.textContent = lang.toUpperCase();
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (key) el.textContent = t(key);
  });
  renderSections();
}

function setLang(l) {
  lang = l;
  localStorage.setItem(LANG_KEY, l);
  render();
}

const langWrap = document.getElementById('langSwitch');
const langTrigger = document.getElementById('langTrigger');
langTrigger.addEventListener('click', (e) => {
  e.stopPropagation();
  langWrap.classList.toggle('open');
  langTrigger.setAttribute('aria-expanded', langWrap.classList.contains('open'));
});
document.querySelectorAll('#langSwitch .lang-menu button').forEach(b => {
  b.addEventListener('click', () => {
    setLang(b.dataset.lang);
    langWrap.classList.remove('open');
    langTrigger.setAttribute('aria-expanded', 'false');
  });
});
document.addEventListener('click', (e) => {
  if (!langWrap.contains(e.target)) {
    langWrap.classList.remove('open');
    langTrigger.setAttribute('aria-expanded', 'false');
  }
});
document.getElementById('loginBtn')?.addEventListener('click', () => {
  window.location.href = (window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://app.aivita.uz') + '/ru/sign-in';
});
