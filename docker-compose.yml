version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medsoft
      POSTGRES_USER: medsoft
      POSTGRES_PASSWORD: MedSoft2024db
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  landing:
    image: nginx:alpine
    volumes:
      - ./apps/landing:/usr/share/nginx/html:ro
      - ./apps/landing/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - '80:80'
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.landing.rule=Host(`aivita.uz`)"
      - "traefik.http.routers.landing.entrypoints=web,websecure"
      - "traefik.http.routers.landing.tls=true"
      - "traefik.http.routers.landing.tls.certresolver=letsencrypt"
      - "traefik.http.services.landing.loadbalancer.server.port=80"

volumes:
  pg_data:
